name: Parser Fuzz

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  parser-fuzz:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Install clang
      run: sudo apt-get update && sudo apt-get install -y clang
    - name: Run parser fuzz smoke test
      run: bash tests/fuzz/run_parser_fuzz.sh
